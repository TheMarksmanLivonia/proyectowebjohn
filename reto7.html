<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reto 7</title>

    <!-- bootstrap base -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- libreria hover (imagehover.css) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/imagehover.css/2.0.0/css/imagehover.min.css">

    <!-- css propio -->
    <link rel="stylesheet" href="css/style.css">

    <!-- favicon -->
    <link rel="icon" type="image/png" href="images/favicon.png">
</head>

<body>

    <header class="py-4">
        <div class="container">
            <div class="box">
                <h1 class="title">Reto #7</h1>
                <p class="subtitle mb-0">Sección fotográfica con transiciones</p>
            </div>
        </div>
    </header>

    <section class="container pb-5">

        <div class="mb-3">
            <a href="index.html" class="btn btn-back">Volver al menú</a>
        </div>

        <div class="box p-4 p-md-5">

            <div class="text-center mb-4">
                <h2 class="big-title mb-2">ÁREAS CREATIVAS</h2>
                <p class="text-muted mb-0">Pasá el mouse por cada imagen para ver el efecto hover.</p>
            </div>

            <div class="row g-4">

                <!-- 1 -->
                <div class="col-12 col-sm-6 col-lg-4">
                    <figure class="imghvr-fade reto7-card">
                        <img src="images/reto7-1.jpg" alt="SEO Marketing" class="img-fluid reto7-img">
                        <figcaption class="reto7-cap">
                            <h3>SEO Marketing</h3>
                            <p>Optimización y visibilidad en buscadores.</p>
                        </figcaption>
                    </figure>
                    <div class="reto7-label">SEO Marketing</div>
                </div>

                <!-- 2 -->
                <div class="col-12 col-sm-6 col-lg-4">
                    <figure class="imghvr-slide-up reto7-card">
                        <img src="images/reto7-2.jpg" alt="Social Media" class="img-fluid reto7-img">
                        <figcaption class="reto7-cap">
                            <h3>Social Media</h3>
                            <p>Gestión de comunidades y contenido.</p>
                        </figcaption>
                    </figure>
                    <div class="reto7-label">Community Management</div>
                </div>

                <!-- 3 -->
                <div class="col-12 col-sm-6 col-lg-4">
                    <figure class="imghvr-zoom-in reto7-card">
                        <img src="images/reto7-3.jpg" alt="Ecommerce" class="img-fluid reto7-img">
                        <figcaption class="reto7-cap">
                            <h3>Ecommerce</h3>
                            <p>Ventas online con estrategia digital.</p>
                        </figcaption>
                    </figure>
                    <div class="reto7-label">Comercio Electrónico</div>
                </div>

                <!-- 4 -->
                <div class="col-12 col-sm-6 col-lg-4">
                    <figure class="imghvr-blur reto7-card">
                        <img src="images/reto7-4.jpg" alt="Auto maquillaje" class="img-fluid reto7-img">
                        <figcaption class="reto7-cap">
                            <h3>Auto maquillaje</h3>
                            <p>Estilo, técnica y creatividad visual.</p>
                        </figcaption>
                    </figure>
                    <div class="reto7-label">Automaquillaje</div>
                </div>

                <!-- 5 -->
                <div class="col-12 col-sm-6 col-lg-4">
                    <figure class="imghvr-push-up reto7-card">
                        <img src="images/reto7-5.jpg" alt="Neuromarketing" class="img-fluid reto7-img">
                        <figcaption class="reto7-cap">
                            <h3>Neuromarketing</h3>
                            <p>Decisiones, emoción y comportamiento.</p>
                        </figcaption>
                    </figure>
                    <div class="reto7-label">Neuromarketing</div>
                </div>

                <!-- 6 -->
                <div class="col-12 col-sm-6 col-lg-4">
                    <figure class="imghvr-reveal-down reto7-card">
                        <img src="images/reto7-6.jpg" alt="Dibujo vectorial" class="img-fluid reto7-img">
                        <figcaption class="reto7-cap">
                            <h3>Vectorial</h3>
                            <p>Ilustración limpia y escalable.</p>
                        </figcaption>
                    </figure>
                    <div class="reto7-label">Dibujo Vectorial</div>
                </div>

            </div>

        </div>

    </section>

    <footer class="py-4">
        <div class="container">
            <div class="box foot p-3">
                <small class="text-muted">Tarea 2, Febrero 2026 - Johnny Fernandez</small>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
